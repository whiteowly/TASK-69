spring:
  application:
    name: croh-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

croh:
  encryption:
    key: ${CROH_ENCRYPTION_KEY:}
  storage:
    base-path: ${CROH_STORAGE_PATH:/app/storage}

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        same-site: strict
      timeout: 30m

logging:
  level:
    com.croh: INFO
    org.springframework.security: WARN
