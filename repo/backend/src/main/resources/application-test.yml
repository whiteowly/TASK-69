spring:
  datasource:
    url: jdbc:h2:mem:croh_test;MODE=MYSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

croh:
  encryption:
    key: test-encryption-key-32-chars-ok!
  storage:
    base-path: ${java.io.tmpdir}/croh-test-storage
